<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Array Methods</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>JavaScript Array Methods Project</h1>

    <input type="text" id="value" placeholder="Enter Number or Text">

    <br><br>

    <button onclick="pushItem()">Push</button>
    <button onclick="popItem()">Pop</button>
    <button onclick="shiftItem()">Shift</button>
    <button onclick="unshiftItem()">Unshift</button>
    <button onclick="sortItem()">Sort</button>
    <button onclick="reverseItem()">Reverse</button>
    <button onclick="sliceItem()">Slice</button>
    <button onclick="spliceItem()">Splice</button>
    <button onclick="indexOfItem()">IndexOf</button>
    <button onclick="includesItem()">Includes</button>
    <button onclick="joinItem()">Join</button>
    <button onclick="lengthItem()">Length</button>
    <button onclick="clearArray()">Clear</button>

    <hr>

    <h3>Array :</h3>
    <p id="array"></p>

    <h3>Result :</h3>
    <p id="result"></p>

    <script src="script.js"></script>

</body>
</html>
